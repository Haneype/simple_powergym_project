# ===== 配电网环境 =====
env:
  system: "case33bw"        # 改:IEEE 33 节点配电系统
  v_min: 0.95
  v_max: 1.05
  v_base: 1.0
  episode_steps: 24
  dt: 1.0

# ===== 储能 (ESS) =====
ess:
  # 每个 ESS 接入的节点编号(pandapower母线索引),后面建好网络再确认具体值
  buses: [13, 17, 32]       # 改:放在电压薄弱的三个节点
  E_max: 2.0                # 额定容量 (MWh)
  S_max: 0.5                # PCS 视在功率额定 (MVA)
  P_max: 0.5                # 最大充放电功率 (MW)
  soc_init: 0.5             # 初始 SOC
  soc_min: 0.1              # SOC 下限
  soc_max: 0.9              # SOC 上限
  eta_c: 0.95               # 充电效率
  eta_dc: 0.95              # 放电效率
  life_loss_coef: 5.0      # 寿命损耗系数 c (元/MWh 量级,可调)

# ===== 奖励 =====
reward:
  rho1: 100.0               # 电压越限惩罚系数

# ===== MASAC 算法 =====
algo:
  name: "masac"
  gamma: 0.99               # 折扣因子
  tau: 0.005                # 目标网络软更新系数
  lr_actor: 0.0003
  lr_critic: 0.0003
  lr_alpha: 0.0003
  hidden_dim: 256
  batch_size: 256
  buffer_size: 100000
  start_steps: 1000         # 开始更新前的随机探索步数
  auto_entropy: true        # 自适应温度系数

# ===== 训练 =====
train:
  episodes: 1000
  seed: 42
  eval_interval: 10        # 每隔多少episode评估一次
  save_interval: 200
  device: "cpu"             # 先用 cpu,后期可改 cuda
  results_dir: "results/case33"    # 新增
  plots_dir: "plots/case33"        # 新增